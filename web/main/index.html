<div style="overflow: hidden;">
    <select name="installs" id="installs" onchange="window.currentPageStack.loadInst(this.value)">

    </select>
    <h1>Patch menu</h1>
    <div style="overflow-y: scroll; height: 550px; overflow-x: hidden;">
        <table style="width: 100%; max-height: 200px; overflow-y: scroll;" id="modtable">
            <colgroup>
                <col style="width: 5%;">
                <col style="width: 75%;">
                <col style="width: 20%;">
            </colgroup>
            <thead style="position: sticky; top: -2px;">
                <tr>
                    <th>Priority</th>
                    <th>Mod</th>
                    <th>Apply?</th>
                </tr>
            </thead>
            <tbody id="modlist">

            </tbody>
        </table>
    </div>
    <div class="buttons">
        <button class="hbiggest" onclick="window.currentPageStack.patchAndRun()" id="par">Patch and run</button>
        <div class="array">
            <button>Add</button>
            <button>Tools</button>
            <button>Options</button>
        </div>
    </div>
</div>

<style>
    .buttons {
        background-color: rgba(56, 56, 56, 0.384);
        margin-top: 20px;
        padding: 10px;
        border-radius: 4px;
        width: calc(100% - 20px);
    }
    .array {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        width: 100%;
    }
    .hbiggest {
        width: 100%;
    }

    tr {
        height: 100%;
    }

    select {
        font-family: "Pixel", sans-serif;
        font-size: 10px;
        color: white;
        background-color: rgb(15, 15, 15);
        border: 1px solid rgb(66, 66, 66);
        padding: 5px;
        width: 100%;
        margin-bottom: 10px;
    }

    .checkmod {
        text-align: center;
    }

    .checkmod > input {
        margin: 0;
        width: 15px;
        height: 15px;
        accent-color: black;
        border: 3px solid white;
    }
    .checkmod > input:checked {
        /* For browsers that don't support accent-color, fallback: */
        background-color: black;
        color: white;
    }

    th {
        text-align: left;
    }
</style>

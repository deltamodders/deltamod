<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deltamod error</title>
    <link rel="stylesheet" href="../commons/base.css">
</head>
<body>
    <div class="win">
        <div class="organizer">
        <img src="funne.gif" alt="" width="300">
        </div>
        <div>
            <h2>A fatal error occurred:</h2>
            <p><i>Unknown error</i></p>
        </div>
    </div>
</body>
<style>
    p > i {
        font-style: italic;
        color: #505050;
    }
    body {
        width: 100%;
        height: 100vh;
    }
    .win {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
    }
    div {
        text-align: center;
    }
    a {
        color: white;
    }
    .organizer {
        display: flex;
        width: 100%;
        justify-content: center;
        align-items: center;
    }
</style>
<script>
    (async () => {
        var error = await window.electronAPI.invoke('fetchSharedVariable',['error']);
        if (error) {
            document.querySelector("p > i").innerText = error;
        }
    })();
</script>
</html>
